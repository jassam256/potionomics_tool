<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potiomics Ingredient Tool</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h1>Potionomics Application</h1>
    </header>

    <main>
      <div class="sidebar">
        <h2>Sidebar</h2>
        <div class="search-section">
          <h3>Search</h3>
          <label for="search">Search: </label>
          <input type="text" name="search" id="search-string" />
        </div>
        <div>
          <h3>Filter</h3>
          <button type="button" id="reset-all">Reset All</button>
          <h4 id="magimin-toggle" class="filter-toggle">Magimins</h4>
          <div id="magimin-filter" class="filter-section hide">
            <div class="magimin-filter-row">
              <p>Type</p>
              <p>Min</p>
              <p>Max</p>
            </div>
            <div class="magimin-filter-row">
              <button type="button">A</button>
              <input type="text" name="" id="a-min" />
              <input type="text" name="" id="a-max" />
            </div>
            <div class="magimin-filter-row">
              <button type="button">B</button>
              <input type="text" name="" id="b-min" />
              <input type="text" name="" id="b-max" />
            </div>
            <div class="magimin-filter-row">
              <button type="button">C</button>
              <input type="text" name="" id="c-min" />
              <input type="text" name="" id="c-max" />
            </div>
            <div class="magimin-filter-row">
              <button type="button">D</button>
              <input type="text" name="" id="d-min" />
              <input type="text" name="" id="d-max" />
            </div>
            <div class="magimin-filter-row">
              <button type="button">E</button>
              <input type="text" name="" id="e-min" />
              <input type="text" name="" id="e-max" />
            </div>
            <div class="magimin-filter-row">
              <p>Total:</p>
              <input type="text" name="" id="total-min" />
              <input type="text" name="" id="total-max" />
            </div>
            <div class="magimin-btns">
              <button type="button" id="magimin-clear">Clear</button>
            </div>
          </div>
          <h4 id="location-toggle" class="filter-toggle">Location</h4>
          <div id="location-filter" class="filter-section hide">
            <button type="button" id="location-all">Select All</button>
            <button type="button" id="location-none">Select None</button>
            <div class="location-filter-content">
              <div class="location-filter-l">
                <button id="toggle-ef">Enchanted Forest</button>
                <button id="toggle-bw">Bone Wastes</button>
                <button id="toggle-oc">Ocean Coasts</button>
                <button id="toggle-sf">Sulfuric Falls</button>
                <button id="toggle-cf">Crystalline Forest</button>
                <button id="toggle-do">Dragon Oasis</button>
                <button id="toggle-mw">Magical Wasteland</button>
              </div>
              <div class="location-filter-r">
                <button id="toggle-mm">Mushroom Mire</button>
                <button id="toggle-sp">Storm Plains</button>
                <button id="toggle-ss">Shadow Steppe</button>
                <button id="toggle-ic">Ice Craggs</button>
                <button id="toggle-ar">Arctic</button>
                <button id="toggle-cr">Crater</button>
              </div>
            </div>
          </div>
          <h4 id="type-toggle" class="filter-toggle">Type</h4>
          <div id="type-filter" class="filter-section hide">
            <button type="button" id="types-all">Select All</button>
            <button type="button" id="types-none">Select None</button>
            <div class="type-filter-content">
              <div class="type-filter-l">
                <button type="button" id="bone">Bone</button>
                <button type="button" id="essence">Essence</button>
                <button type="button" id="flesh">Flesh</button>
                <button type="button" id="fruit">Fruit</button>
                <button type="button" id="gem">Gem</button>
                <button type="button" id="ore">Ore</button>
                <button type="button" id="mana">Pure Mana</button>
              </div>
              <div class="type-filter-r">
                <button type="button" id="bug">Bug</button>
                <button type="button" id="fish">Fish</button>
                <button type="button" id="flower">Flower</button>
                <button type="button" id="fungus">Fungus</button>
                <button type="button" id="mineral">Mineral</button>
                <button type="button" id="plant">Plant</button>
                <button type="button" id="slime">Slime</button>
              </div>
            </div>
          </div>
          <h4 id="traits-toggle" class="filter-toggle">Traits</h4>
          <div id="traits-filter" class="filter-section hide">
            <button type="button" id="reset-traits">Reset All</button>
            <div class="traits-filter-content">
              <button type="button" id="taste-btn">Taste</button>
              <button type="button" id="sensation-btn">Sensation</button>
              <button type="button" id="aroma-btn">Aroma</button>
              <button type="button" id="visual-btn">Visual</button>
              <button type="button" id="sound-btn">Sound</button>
            </div>
          </div>
          <h4 id="rarity-toggle" class="filter-toggle">Rarity</h4>
          <div id="rarity-filter" class="filter-section hide">
            <button type="button" id="rarity-all">Select All</button>
            <button type="button" id="rarity-none">Select None</button>
            <div class="rarity-filter-content">
              <p>Toggle Rarity:</p>
              <button type="button" id="rarity-1">1</button>
              <button type="button" id="rarity-2">2</button>
              <button type="button" id="rarity-3">3</button>
              <button type="button" id="rarity-4">4</button>
            </div>
          </div>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th id="header-id">#</th>
              <th id="header-icon">Icon</th>
              <th id="header-name">Ingredient</th>
              <th id="header-location">Location</th>
              <th id="header-rarity">Rarity</th>
              <th id="header-type">Type</th>
              <!-- MAGIMINS -->
              <th id="header-mag-a">
                <img
                  src="./img/magimins/Magimin-A.webp"
                  alt="Magimin A - Red"
                />
              </th>
              <th id="header-mag-b">
                <img
                  src="./img/magimins/Magimin-B.webp"
                  alt="Magimin B - Green"
                />
              </th>
              <th id="header-mag-c">
                <img
                  src="./img/magimins/Magimin-C.webp"
                  alt="Magimin C - Yellow"
                />
              </th>
              <th id="header-mag-d">
                <img
                  src="./img/magimins/Magimin-D.webp"
                  alt="Magimin D - Blue"
                />
              </th>
              <th id="header-mag-e">
                <img
                  src="./img/magimins/Magimin-E.webp"
                  alt="Magimin-E Purple"
                />
              </th>
              <th id="header-mag-total">Total</th>

              <!-- SHOP INFO -->
              <th id="header-price">Base Price</th>
              <th id="header-quinn">Sold by Quinn</th>

              <!-- TRAITS -->
              <th id="header-taste">Taste</th>
              <!-- Sense instead of sensation -->
              <th id="header-sensation">Sense</th>
              <th id="header-aroma">Aroma</th>
              <th id="header-visual">Visual</th>
              <th id="header-sound">Sound</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </main>

    <footer></footer>

    <script src="./js/ingredientList.js"></script>
    <script src="./js/ingredients.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
